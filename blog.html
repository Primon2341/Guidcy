<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Guidcy Blog</title><meta name="description" content="Guidcy blog for expert guidance, consultation insights, and user comments."><link rel="icon" type="image/png" href="/favicon.png"><link rel="apple-touch-icon" href="/favicon.png"><meta property="og:image" content="https://www.guidcy.com/logo.png"><style>:root{--blue:#1E72BE;--blue-d:#155A99;--ink:#0C1825;--muted:#7089A0;--bg:#F8FBFF;--surface:#fff;--border:#D8E8F5}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--ink)}.nav{height:72px;display:flex;align-items:center;padding:0 34px;background:#fff;border-bottom:1px solid var(--border);gap:22px}.logo img{height:58px}.links{margin-left:auto;display:flex;gap:18px;flex-wrap:wrap}.links a{text-decoration:none;color:#5d7690;font-weight:700}.links a:hover{color:var(--blue)}.wrap{max-width:1000px;margin:0 auto;padding:50px 20px}.card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:16px}h1{font-size:42px;margin:0 0 8px}h2{margin:0 0 6px}p{color:#42576b;line-height:1.6}.muted{color:var(--muted)}input,textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:12px;font-size:14px;margin:8px 0 12px}textarea{min-height:140px}.btn{border:0;border-radius:12px;background:var(--blue);color:#fff;font-weight:800;padding:12px 18px;cursor:pointer}.comment{background:#F8FBFF;border:1px solid #E6F1FB;border-radius:12px;padding:10px;margin:8px 0}.footer{background:#0C1825;color:#cbd5e1;text-align:center;padding:28px}.footer h4{color:#1E72BE}@media(max-width:700px){.nav{padding:0 14px;height:auto;min-height:72px}.links{gap:10px}.links a{font-size:13px}.logo img{height:46px}h1{font-size:32px}}</style></head><body><nav class="nav"><a class="logo" href="/"><img src="/logo.png" alt="Guidcy logo"></a><div class="links"><a href="/">Home</a><a href="/browse">Browse</a><a href="/jobs">Jobs</a><a href="/become-a-consultant">Become a Consultant</a><a href="/login">Login</a></div></nav><main class="wrap"><h1>Guidcy Blog</h1><p class="muted">Admin can publish blogs. Users and consultants can comment below each post.</p><section id="adminBox" class="card" style="display:none"><h2>Write Blog</h2><input id="title" placeholder="Blog title"><textarea id="body" placeholder="Write your blog here"></textarea><button class="btn" onclick="addPost()">Publish Blog</button></section><div id="posts"></div></main><footer class="footer">© Guidcy — Expert Guidance on Demand</footer><script>const adminEmail='tripathiprakhar41@gmail.com';function posts(){return JSON.parse(localStorage.getItem('guidcy_blog_posts')||'[]')}function save(p){localStorage.setItem('guidcy_blog_posts',JSON.stringify(p))}function esc(s){return String(s||'').replace(/[&<>']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;'}[c]))}function isAdmin(){return localStorage.getItem('guidcy_admin')==='1'||promptAdmin===true}let promptAdmin=false;function checkAdmin(){const e=localStorage.getItem('guidcy_last_email')||'';if(e.toLowerCase()===adminEmail) localStorage.setItem('guidcy_admin','1');document.getElementById('adminBox').style.display=isAdmin()?'block':'none'}function addPost(){const t=document.getElementById('title').value.trim(),b=document.getElementById('body').value.trim();if(!t||!b)return alert('Please add title and content');const p=posts();p.unshift({title:t,body:b,date:new Date().toLocaleDateString('en-IN'),comments:[]});save(p);render()}function addComment(i){const el=document.getElementById('c'+i),txt=el.value.trim();if(!txt)return;const p=posts();p[i].comments=p[i].comments||[];p[i].comments.push({name:'Guidcy Visitor',text:txt});save(p);render()}function render(){const p=posts();document.getElementById('posts').innerHTML=p.length?p.map((x,i)=>`<article class="card"><h2>${esc(x.title)}</h2><div class="muted" style="font-size:12px">${esc(x.date)}</div><p style="white-space:pre-wrap">${esc(x.body)}</p><h4 style="color:#1E72BE">Comments</h4>${(x.comments||[]).map(c=>`<div class="comment"><b>${esc(c.name)}</b><p>${esc(c.text)}</p></div>`).join('')||'<p class="muted">No comments yet.</p>'}<input id="c${i}" placeholder="Write a comment"><button class="btn" onclick="addComment(${i})">Comment</button></article>`).join(''):'<div class="card muted">No blog posts yet.</div>'}checkAdmin();render()</script></body></html>
