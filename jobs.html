<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jobs - Guidcy</title>
  <meta name="description" content="Find latest job openings and apply on original websites.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: auto; }
    input, button { padding: 10px; margin: 5px; }
    .job { border: 1px solid #ddd; padding: 15px; margin-top: 10px; border-radius: 8px; }
    .error { color: red; margin-top: 10px; }
  </style>
</head>

<body>

<div class="container">

  <h1>Find Jobs</h1>

  <input id="query" placeholder="Job title or skill">
  <input id="location" placeholder="Location (e.g. India)">
  <button onclick="searchJobs()">Search Jobs</button>

  <div id="error" class="error"></div>
  <div id="results"></div>

</div>

<script>

async function searchJobs() {
  const query = document.getElementById("query").value;
  const location = document.getElementById("location").value;

  const errorDiv = document.getElementById("error");
  const resultsDiv = document.getElementById("results");

  errorDiv.innerText = "";
  resultsDiv.innerHTML = "Loading...";

  try {
    const response = await fetch(`/api/jobs?q=${encodeURIComponent(query)}&location=${encodeURIComponent(location)}`);

    const data = await response.json();

    // ✅ Proper error handling
    if (!response.ok) {
      throw new Error(data.message || "API error");
    }

    // ✅ Clear results
    resultsDiv.innerHTML = "";

    if (!data.data || data.data.length === 0) {
      resultsDiv.innerHTML = "<p>No jobs found.</p>";
      return;
    }

    // ✅ Render jobs
    data.data.forEach(job => {
      const div = document.createElement("div");
      div.className = "job";

      div.innerHTML = `
        <h3>${job.job_title}</h3>
        <p><strong>Company:</strong> ${job.employer_name || "N/A"}</p>
        <p><strong>Location:</strong> ${job.job_city || "N/A"}, ${job.job_country || ""}</p>
        <a href="${job.job_apply_link}" target="_blank">Apply on Original Website</a>
      `;

      resultsDiv.appendChild(div);
    });

  } catch (err) {
    console.error("Job API error:", err);

    // ✅ Fix for [object Object] issue
    errorDiv.innerText = err.message || "Search failed";

    resultsDiv.innerHTML = "";
  }
}

</script>

</body>
</html>
