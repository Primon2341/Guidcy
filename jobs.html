<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Current Job Openings Online | Guidcy Jobs</title>
  <meta name="description" content="Search current job openings from public job websites on Guidcy." />
  <link rel="icon" href="/favicon.png" />
</head>

<body>

<h1>Find Jobs</h1>

<input id="jobQuery" placeholder="Job title or skill">
<input id="jobLocation" placeholder="Location" value="India">
<button onclick="searchJobs()">Search</button>

<p id="statusText"></p>
<div id="errorBox" style="color:red;"></div>
<div id="jobsList"></div>

<script>

function renderJobs(jobs){
  const list = document.getElementById('jobsList');

  if(!jobs.length){
    list.innerHTML = "<p>No jobs found</p>";
    return;
  }

  list.innerHTML = jobs.map(job => `
    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
      <h3>${job.title}</h3>
      <p><b>${job.company}</b></p>
      <p>${job.location}</p>
      <a href="${job.applyLink}" target="_blank">Apply</a>
    </div>
  `).join('');
}

async function searchJobs(){
  const q = document.getElementById('jobQuery').value;
  const location = document.getElementById('jobLocation').value;

  document.getElementById('statusText').innerText = "Searching...";
  document.getElementById('errorBox').innerText = "";
  document.getElementById('jobsList').innerHTML = "";

  try {
    const res = await fetch(`/api/jobs?q=${encodeURIComponent(q)}&location=${encodeURIComponent(location)}`);

    const raw = await res.text();

    let data;
    try {
      data = JSON.parse(raw);
    } catch {
      throw new Error("API not returning JSON. Check /api/jobs");
    }

    if(!res.ok){
      throw new Error(data.message || "API error");
    }

    // ✅ FIX HERE (support both formats)
    const jobs = Array.isArray(data.jobs)
      ? data.jobs
      : Array.isArray(data.data)
        ? data.data.map(job => ({
            title: job.job_title || 'No title',
            company: job.employer_name || 'Unknown company',
            location: [job.job_city, job.job_state, job.job_country].filter(Boolean).join(', ') || 'Location not available',
            applyLink: job.job_apply_link || job.job_google_link || '#'
          }))
        : [];

    document.getElementById('statusText').innerText =
      `Found ${jobs.length} jobs`;

    renderJobs(jobs);

  } catch(err){
    console.error(err);
    document.getElementById('errorBox').innerText = err.message;
    document.getElementById('statusText').innerText = "Search failed";
  }
}

</script>

</body>
</html>
